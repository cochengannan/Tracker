<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard — Student Tracker</title>
</head>
<body>
<script src="config.js"></script>
<script src="shared.js"></script>
<script>
if (!guardAdmin()) throw '';

async function init() {
  const today = new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  renderAdminLayout(`
    <div class="page-header">
      <div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-sub">${today}</p>
      </div>
    </div>
    <div class="stat-grid" id="statGrid"><div class="empty-state">Loading...</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
      <div class="panel">
        <div class="panel-head">Today's Attendance</div>
        <div id="attTable"><div class="empty-state">Loading...</div></div>
      </div>
      <div class="panel">
        <div class="panel-head">Recent Notifications</div>
        <div id="notifList"><div class="empty-state">Loading...</div></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head">Course Progress Overview</div>
      <div id="courseProgress"><div class="empty-state">Loading...</div></div>
    </div>
  `);

  const stats = await apiGet('/dashboard/stats/');
  if (!stats || stats.error) { document.getElementById('statGrid').innerHTML='<div class="empty-state">Failed to load. Is Django running?</div>'; return; }

  const pct = stats.total_students ? Math.round(stats.present_today / stats.total_students * 100) : 0;

  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card" style="border-top:3px solid #4361ee">
      <div class="stat-label">Total Students</div>
      <div class="stat-value">${stats.total_students}</div>
      <div class="stat-sub">active</div>
    </div>
    <div class="stat-card" style="border-top:3px solid #2ec4b6">
      <div class="stat-label">Present Today</div>
      <div class="stat-value" style="color:#2ec4b6">${stats.present_today}</div>
      <div class="stat-sub">${pct}% attendance rate</div>
    </div>
    <div class="stat-card" style="border-top:3px solid #e63946">
      <div class="stat-label">Absent Today</div>
      <div class="stat-value" style="color:#e63946">${stats.absent_today}</div>
      <div class="stat-sub">students</div>
    </div>
    <div class="stat-card" style="border-top:3px solid #f4a261">
      <div class="stat-label">Alerts Sent</div>
      <div class="stat-value" style="color:#f4a261">${stats.notifications_today}</div>
      <div class="stat-sub">today</div>
    </div>`;

  const att = stats.recent_attendance || [];
  document.getElementById('attTable').innerHTML = !att.length
    ? '<div class="empty-state">No records yet today.</div>'
    : `<table class="data-table"><thead><tr><th>Student</th><th>Login</th><th>Status</th></tr></thead><tbody>
        ${att.map(a=>`<tr>
          <td style="font-weight:500">${esc(a.student_name)}</td>
          <td style="color:#6c757d">${fmtTime(a.login_time)}</td>
          <td>${badge(a.status)}</td>
        </tr>`).join('')}
      </tbody></table>`;

  const notifs = stats.recent_notifications || [];
  document.getElementById('notifList').innerHTML = !notifs.length
    ? '<div class="empty-state">No notifications yet.</div>'
    : notifs.map(n => {
        const icons = {login:'🟢',logout:'🔴',absent:'⚠️',general:'📢'};
        return `<div style="padding:10px 20px;border-bottom:1px solid #f0f2f5;display:flex;align-items:flex-start;gap:10px">
          <span style="font-size:16px;flex-shrink:0">${icons[n.type]||'📢'}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500">${esc(n.student_name)}</div>
            <div style="font-size:12px;color:#6c757d;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(n.message)}</div>
          </div>
          <div style="font-size:11px;color:#6c757d;white-space:nowrap;flex-shrink:0">${fmtTime(n.sent_at)}</div>
        </div>`;
      }).join('');

  const cp = stats.course_progress || [];
  document.getElementById('courseProgress').innerHTML = !cp.length
    ? '<div class="empty-state">No courses found.</div>'
    : cp.map(c => {
        const p = c.total ? Math.round(c.completed / c.total * 100) : 0;
        return `<div style="padding:12px 20px;border-bottom:1px solid #f0f2f5">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="font-size:14px;font-weight:500">${esc(c.name)}</span>
            <span style="font-size:13px;color:#6c757d">${c.completed}/${c.total} modules · ${p}%</span>
          </div>
          <div class="pbar-wrap"><div class="pbar" style="width:${p}%;background:#4361ee"></div></div>
        </div>`;
      }).join('');
}

init();
</script>
</body>
</html>
